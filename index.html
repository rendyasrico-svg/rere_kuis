<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RERE KUIS</title>

    <link rel="icon" type="image/png" href="rerekuis.png">

    <meta property="og:title" content="RERE KUIS">
    <meta property="og:description" content="Website kuis interaktif RERE KUIS">
    <meta property="og:image" content="https://rendyasrico-svg.github.io/rere_kuis/rerekuis.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://rendyasrico-svg.github.io/rere_kuis/">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TOMBOL KEMBALI (default sembunyi) -->
    <button class="back-btn" onclick="goBack()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5" />
            <path d="M12 19L5 12L12 5" />
        </svg>
    </button>

    <!-- HAMBURGER (default sembunyi) -->
    <div class="hamburger" onclick="toggleMenu()">☰</div>

    <!-- SIDE MENU -->
    <div id="sideMenu" class="side-menu">
        <h2>Menu</h2>
        <button onclick="goHome()">🏠 Beranda</button>
        <button onclick="showLeaderboard()">🏆 Leaderboard</button>
        <button onclick="showAbout()">ℹ️ Tentang</button>
        <button onclick="resetScore()">🔄 Reset Skor</button>
    </div>

    <!-- SPLASH SCREEN -->
    <div id="splash-screen" class="splash-screen">
        <div class="logo-box">
            <img src="rerekuis.png" alt="RERE KUIS" class="intro-logo" />
            <h1>RERE KUIS</h1>
            <p>Tantang Dirimu, Raih Skor Tertinggi!</p>
            <div class="loader"></div>
        </div>
    </div>

    <!-- START SCREEN -->
    <div id="start-screen" class="start-screen hidden">
        <div class="glass-card">
            <img src="rerekuis.png" class="intro-logo" alt="RERE KUIS" />
            <h1 class="title">RERE KUIS</h1>
            <p class="subtitle">Tantang Dirimu dan Raih Skor Tertinggi!</p>
            <button class="start-btn" onclick="showMenu()">MULAI</button>
        </div>
    </div>

    <!-- MENU UTAMA -->
    <div id="menu-screen" class="hidden">
        <div class="glass-card">
            <h1 class="title">RERE KUIS</h1>
            <p class="subtitle">Pilih Tingkat Kesulitan</p>
            <button class="menu-btn easy" onclick="startGame('mudah')">Mudah</button>
            <button class="menu-btn medium" onclick="startGame('sedang')">Sedang</button>
            <button class="menu-btn hard" onclick="startGame('sulit')">Sulit</button>
            <div class="leaderboard-box">
                <h3>🏆 Skor Tertinggi</h3>
                <div id="bestScore">0</div>
            </div>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="hidden">
        <div class="glass-card">
            <div class="top-info">
                <div class="score-box">Skor: <span id="score">0</span></div>
                <div class="timer-box">⏱ <span id="timer">30</span></div>
            </div>
            <div class="life-box">
                <span id="life1">❤️</span>
                <span id="life2">❤️</span>
                <span id="life3">❤️</span>
            </div>
            <div class="progress"><div id="progressBar"></div></div>
            <div class="question-card"><h2 id="question"></h2></div>
            <div class="answer-area">
                <input type="text" id="answerInput" placeholder="Masukkan jawaban..." autocomplete="off" />
                <button class="submit-btn" onclick="checkAnswer()">Kirim Jawaban</button>
            </div>
            <div id="message"></div>
        </div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="hidden">
        <div class="glass-card">
            <h1>🎉 Permainan Selesai</h1>
            <h2>Skor Akhir</h2>
            <div id="finalScore">0</div>
            <div class="result-stats"></div>
            <button class="menu-btn" onclick="mainLagi()">Main Lagi</button>
            <button class="share-btn" onclick="shareResult()">📤 Bagikan ke WhatsApp</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
